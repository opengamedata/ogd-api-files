# Workflow to deploy and test Files API to the CI server
name: CI Script - FileAPI
run-name: ${{ format('{0} - {1}', github.workflow, github.event_name == 'push' && github.event.head_commit.message || 'Manual Run') }}
on:
  workflow_dispatch:
  push:
    paths:
    - '.github/workflows/CI_FileAPI.yml'
    - '.github/workflows/DEPLOY_FileAPI.yml'
    - '.github/actions/**'
    - 'package/**'
    - 'src/**'
    - 'requirements.txt'

jobs:

  build:
    name: Build Python Package
    uses: ./.github/workflows/BUILD_FileAPI.yml
    with:
      with_caching: false

  testbed_fileapi_local:
    name: FileAPI Local Testbeds
    needs: build
    uses: ./.github/workflows/TEST_FileAPI_local.yml

  ci_deploy:
    name: CI Deploy of Website API
    uses: ./.github/workflows/DEPLOY_FileAPI.yml
    with:
      deploy_host: ${{ vars.OGD_STAGING_HOST }}
      branch: ${{ github.ref_name }}
      remove: false
    secrets: inherit

  testbed_hello_remote:
    name: HelloAPI Remote Testbed
    needs: ci_deploy
    uses: ./.github/workflows/TEST_HelloAPI_remote.yml

  testbed_fileapi_remote:
    name: FileAPI Remote Testbeds
    needs: ci_deploy
    uses: ./.github/workflows/TEST_FileAPI_remote.yml

  testbed_legacyapi:
    name: LegacyWebAPI Testbed
    needs: ci_deploy
    uses: ./.github/workflows/TEST_LegacyWebAPI_remote.yml
